port: 7890
socks-port: 7891
allow-lan: true
mode: rule
log-level: info
external-controller: 127.0.0.1:9090

# 1. 订阅源配置
proxy-providers:
  my_sub:
    type: http
    url: "https://64.186.227.22/CkqMwL425tM0C7RBECf8zRhKNOuZNayZ?token=5a582667b9d2bc9c3174c5296b9cc806&clash=1"
    interval: 3600
    path: ./proxies.yaml
    health-check:
      enable: true
      interval: 600
      url: http://www.gstatic.com/generate_204

# 2. 策略组配置
proxy-groups:
  # 默认的国外代理组（手动选择节点）
  - name: 🚀 节点选择
    type: select
    use:
      - my_sub

  # AI 专属分组：利用 filter 自动筛选出你指定的美国节点
  - name: 🎬 AI专属
    type: select
    use:
      - my_sub
    filter: "PRO-D-美国-US01"

  # 直连分组
  - name: 🎯 全球直连
    type: select
    proxies:
      - DIRECT

# 3. 规则配置 (由上至下匹配)
rules:
  # --- AI 相关规则 (强制走指定的美国节点) ---
  - DOMAIN-SUFFIX,openai.com,🎬 AI专属
  - DOMAIN-SUFFIX,chatgpt.com,🎬 AI专属
  - DOMAIN-SUFFIX,oaistatic.com,🎬 AI专属
  - DOMAIN-SUFFIX,oaiusercontent.com,🎬 AI专属
  - DOMAIN-SUFFIX,gemini.google.com,🎬 AI专属
  - DOMAIN-KEYWORD,gemini,🎬 AI专属

  # --- 国内直连规则 (匹配中国 IP 和常见国内域名) ---
  - GEOIP,CN,🎯 全球直连
  - DOMAIN-SUFFIX,cn,🎯 全球直连

  # --- 漏网之鱼 (其他所有国外网站走默认代理) ---
  - MATCH,🚀 节点选择
